name: CI

# Quality gate: type-check + production build on every push to main and every PR.
# Runs on Linux (ubuntu), which is case-sensitive — so it catches import-casing bugs that
# Windows hides, before Vercel deploys. This does NOT deploy; Vercel's Git integration handles
# deploys on push to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
